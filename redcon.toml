# Redcon configuration — generated by `redcon init`
# See: https://github.com/redcon/redcon/docs/configuration.md
# Detected dominant language: python

[budget]
max_tokens = 64000
# top_files = 100

[scan]
# ignore_globs = ["tests/**", "docs/**"]

[score]
enable_import_graph_signals = true
history_selected_file_boost = 1.25

[compression]
full_file_threshold_tokens = 600
symbol_extraction_enabled = true

[cache]
backend = "local_file"
summary_cache_enabled = true
run_history_enabled = true
# Shared Redis cache (uncomment for team use):
# backend = "redis"
# redis_url = "redis://localhost:6379/0"
# redis_namespace = "ContextBudget"
# redis_ttl_seconds = 86400

[telemetry]
enabled = false
# sink = "jsonl"
