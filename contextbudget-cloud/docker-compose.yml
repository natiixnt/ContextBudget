version: "3.9"

services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://contextbudget:contextbudget@db:5432/contextbudget
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: contextbudget
      POSTGRES_PASSWORD: contextbudget
      POSTGRES_DB: contextbudget
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_create_events.sql:/docker-entrypoint-initdb.d/001_create_events.sql
      - ./migrations/002_create_control_plane.sql:/docker-entrypoint-initdb.d/002_create_control_plane.sql
      - ./migrations/003_org_scoped_events.sql:/docker-entrypoint-initdb.d/003_org_scoped_events.sql
      - ./migrations/004_webhooks.sql:/docker-entrypoint-initdb.d/004_webhooks.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contextbudget"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
