# Redcon Cloud — Nginx reverse proxy configuration
# Drop this file into /etc/nginx/conf.d/ or reference it from your main nginx.conf.
# Replace `cloud.example.com` with your actual domain.
# TLS certificates are expected at /etc/letsencrypt/live/<domain>/ (Let's Encrypt).

# Rate limiting zone — 100 req/s per IP with burst allowance
limit_req_zone $binary_remote_addr zone=rc_api:10m rate=100r/s;

upstream redcon_api {
    server api:8080;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name cloud.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cloud.example.com;

    # TLS
    ssl_certificate     /etc/letsencrypt/live/cloud.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloud.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "no-referrer" always;

    # Request size limit (event batches can be moderately large)
    client_max_body_size 4m;

    # Proxy to FastAPI
    location / {
        limit_req zone=rc_api burst=200 nodelay;

        proxy_pass         http://redcon_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     60s;

        # Do not buffer responses — better for streaming and webhook acks
        proxy_buffering off;
    }

    # Health check endpoint — no rate limiting, no auth required
    location /health {
        limit_req           off;
        proxy_pass          http://redcon_api/health;
        proxy_http_version  1.1;
        proxy_set_header    Host $host;
        access_log          off;
    }

    # Logs
    access_log  /var/log/nginx/redcon_access.log;
    error_log   /var/log/nginx/redcon_error.log warn;
}
