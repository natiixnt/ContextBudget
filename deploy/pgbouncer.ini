# PgBouncer configuration for Redcon Cloud
# Drop this file into the pgbouncer container at /etc/pgbouncer/pgbouncer.ini
#
# Quick start:
#   1. Add the pgbouncer service to docker-compose.prod.yml (see below).
#   2. Change DATABASE_URL on the api container to point at pgbouncer:5432
#      instead of db:5432.
#   3. Set CB_PGBOUNCER_PASSWORD in .env.
#
# Sizing guide:
#   - pool_size=20 is safe for a 2-vCPU Postgres instance.
#   - For >100 req/s burst, increase pool_size and max_client_conn.
#   - Use transaction mode (pool_mode = transaction) — the asyncpg pool
#     issues BEGIN/COMMIT explicitly, which is compatible.

[databases]
redcon = host=db port=5432 dbname=redcon

[pgbouncer]
# Listening address — expose only inside the Docker network
listen_addr           = 0.0.0.0
listen_port           = 5432

# Authentication
auth_type             = scram-sha-256
auth_file             = /etc/pgbouncer/userlist.txt

# Pool settings
pool_mode             = transaction
default_pool_size     = 20
max_client_conn       = 200
reserve_pool_size     = 5
reserve_pool_timeout  = 3

# Connection limits
server_idle_timeout   = 600
client_idle_timeout   = 0
server_lifetime       = 3600

# Logging
log_connections       = 0
log_disconnections    = 0
log_pooler_errors     = 1
stats_period          = 60

# Admin console (internal only)
admin_users           = pgbouncer_admin
