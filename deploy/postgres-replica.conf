# PostgreSQL standby (replica) configuration for ContextBudget Cloud.
# Mount as /etc/postgresql/conf.d/standby.conf on the replica instance.
#
# The replica is read-only.  ContextBudget analytics queries (tokens-per-repo,
# cost-by-date, ROI dashboard) can be routed here; writes go to the primary.

# ── Standby behaviour ────────────────────────────────────────────────────────

# Allow read queries while replaying WAL
hot_standby             = on

# Tolerate some WAL replay lag before cancelling conflicting read queries
hot_standby_feedback    = on
max_standby_streaming_delay = 30s

# ── Primary connection ───────────────────────────────────────────────────────
# These are set in postgresql.auto.conf by pg_basebackup, but you can also
# configure them explicitly here.
#
# primary_conninfo = 'host=<primary_ip> port=5432 user=replicator password=<pw> sslmode=require'
#
# Create a standby.signal file to activate standby mode:
#   touch /var/lib/postgresql/data/standby.signal
