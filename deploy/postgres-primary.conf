# PostgreSQL primary configuration for ContextBudget Cloud multi-region setup.
# Append this to postgresql.conf on the primary instance, or mount it as
# /etc/postgresql/conf.d/replication.conf.
#
# These settings enable streaming replication to one or more standby replicas.
# The standby can be in a separate AZ or region (latency <200 ms is fine for
# async replication).

# ── Replication ──────────────────────────────────────────────────────────────

# Minimum number of WAL segments to keep (prevents standby from falling behind)
wal_level               = replica

# Number of concurrent replication connections allowed
max_wal_senders         = 5

# Keep at least 128 MB of WAL so a briefly-disconnected replica can catch up
wal_keep_size           = 128MB

# Allow read-only queries on the standby during recovery
hot_standby             = on

# ── Performance tuning for async replication ─────────────────────────────────

# Async replication (default) — commit returns immediately, replica may lag
# Set to 'on' or name a specific replica for synchronous commits (lower lag,
# higher write latency).
synchronous_commit      = off

# ── Connection / auth ────────────────────────────────────────────────────────

# Add to pg_hba.conf on the primary:
#   host  replication  replicator  <replica_ip>/32  scram-sha-256
#
# Create the replication user:
#   CREATE USER replicator REPLICATION LOGIN PASSWORD '<strong_password>';
