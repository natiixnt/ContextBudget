# Example ContextBudget configuration
model_profile = "gpt-4.1"

[scan]
include_globs = ["**/*.py", "**/*.md", "pyproject.toml"]
ignore_globs = ["**/migrations/**", "**/*.generated.*", "**/vendor/**"]
max_file_size_bytes = 1500000

[budget]
max_tokens = 30000
top_files = 25

[score]
critical_path_keywords = ["auth", "permission", "billing", "security"]

[model]
# Optional overrides, useful for local/self-hosted models.
# tokenizer = "llama-bpe"
# context_window = 65536
# recommended_compression_strategy = "aggressive"
# output_reserve_tokens = 8192

[compression]
summary_preview_lines = 10

[summarization]
backend = "deterministic"
adapter = ""

[cache]
backend = "local_file"
summary_cache_enabled = true
duplicate_hash_cache_enabled = true
cache_file = ".contextbudget_cache.json"

[telemetry]
enabled = false
sink = "file"
file_path = ".contextbudget/telemetry.jsonl"
