name: Release

on:
  push:
    tags:
      # Match only canonical semver tags like v1.2.3 - NOT extension tags
      # such as 'vscode-v0.8.0' (handled by a separate publish flow).
      - "v[0-9]*"
  # Manual fallback when pushing a tag is not possible. The release step
  # creates the tag via the GitHub API at the chosen ref.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create and publish (e.g. v1.7.0)"
        required: true
        type: string

jobs:
  # Gate: never publish a broken wheel. A tag on a red commit must not reach
  # PyPI, so the test suite runs here and publish depends on it passing.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest --tb=short -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    # Must match the trusted publisher registered on PyPI
    # (owner/repo + release.yml + environment "pypi").
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Verify tag matches package version (manual runs)
        if: github.event_name == 'workflow_dispatch'
        run: |
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [[ "${{ inputs.tag }}" != "v${version}" ]]; then
            echo "Tag '${{ inputs.tag }}' does not match pyproject version '${version}'"
            exit 1
          fi

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      # Trusted publishing (OIDC): no API token or password involved.
      # Pinned to an immutable commit SHA (not the movable release/v1 branch)
      # so a compromised upstream branch cannot alter our most sensitive step;
      # this commit is v1.14.0, which is what release/v1 currently points to.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          # On tag pushes this defaults to the pushed tag; on manual runs
          # the tag is created via the API at the workflow's commit.
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/*
