# Workspace

Workspace mode scans, ranks, and packs context across multiple local repositories or monorepo packages in a single run.

---

## Workspace TOML

```toml
name = "backend-services"

[scan]
include_globs = ["**/*.py", "**/*.ts"]
ignore_globs = ["**/generated/**"]

[budget]
max_tokens = 28000
top_files = 30

[[repos]]
label = "auth-service"
path = "../auth-service"

[[repos]]
label = "billing-service"
path = "../billing-service"
ignore_globs = ["tests/fixtures/**"]

[[repos]]
label = "gateway"
path = "../platform/packages/gateway"
include_globs = ["src/**/*.ts"]
```

- `path` is resolved relative to the workspace TOML file
- `label` must be unique; namespaces artifact paths like `auth-service:src/auth.py`
- Repo-specific `include_globs` replace shared `scan.include_globs`
- Repo-specific `ignore_globs` are added on top of shared `scan.ignore_globs`

---

## CLI Usage

```bash
contextbudget plan "add caching" --workspace workspace.toml
contextbudget plan-agent "add caching" --workspace workspace.toml
contextbudget pack "add caching" --workspace workspace.toml --max-tokens 28000
contextbudget benchmark "add auth" --workspace workspace.toml
contextbudget prepare-context "add caching" --workspace workspace.toml
```

---

## Python API

```python
from contextbudget import BudgetGuard

guard = BudgetGuard(max_tokens=28000)
result = guard.pack_context(task="add caching", workspace="workspace.toml")

print(result["workspace"])       # workspace name
print(result["scanned_repos"])   # all scanned repos
print(result["selected_repos"])  # repos that contributed files
```

---

## Workspace Artifacts

File paths in workspace artifacts are prefixed with repo labels:

```json
{
  "files_included": [
    "auth-service:src/auth.py",
    "billing-service:src/payment.py"
  ]
}
```

Additional artifact fields: `workspace`, `scanned_repos`, `selected_repos`.

---

## Architecture Notes

- Scoring is cross-repository: all files are ranked together
- Import-graph resolution stays repo-local to avoid path collisions
- Per-repo scan summaries are available for provenance tracking
