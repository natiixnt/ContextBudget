# Architecture

ContextBudget is organized around a single engine and explicit stage boundaries. CLI, Python API, workspace runs, and agent middleware all route through the same pipeline.

---

## Design Goals

- Deterministic heuristics over opaque model decisions
- Stable machine-readable artifacts (`run.json`)
- Local-first — no required network services
- Explicit extension points: plugins, summarizers, telemetry sinks, agent adapters
- Additive feature growth without breaking single-repo flows

---

## System Layers

```
Entry Points
  cli.py  │  engine.py  │  agents/
         ↓ (all delegate to)
Core Pipeline
  core/pipeline.py  (compat facade)
  stages/workflow.py (explicit stage boundaries)

  1. Scan Refresh   4. Cache
  2. Scan           5. Pack / Compression
  3. Score          6. Render
         ↓
Supporting Layers
  scanners/  scorers/  compressors/
  cache/     plugins/  telemetry/  schemas/
```

---

## Pipeline Stages

| Stage | Module | Description |
|-------|--------|-------------|
| Scan Refresh | `scanners/incremental.py` | Update `.contextbudget/scan-index.json` |
| Scan | `scanners/repository.py` | File traversal with metadata |
| Workspace Scan | `scanners/workspace.py` | Multi-repo scanning with repo labels |
| Score | `scorers/relevance.py` | Deterministic relevance ranking |
| Cache | `cache/summary_cache.py` | Reuse summaries; track duplicates |
| Pack | `compressors/` | Reduce ranked files into context |
| Render | `core/render.py` | Write `run.json` and `run.md` |

---

## Compression Strategies

Built-in strategies (in order of token reduction):
1. Full-file inclusion
2. Snippet extraction (keyword-window slices)
3. Symbol extraction (classes, functions, types)
4. Language-aware import/dependency slicing
5. Deterministic summaries
6. External summarizer adapter

---

## Artifact Model

`run.json` keeps a stable core shape and adds metadata blocks when features are active:

| Block | When added |
|-------|------------|
| `cache` | Always |
| `implementations` | Always (records active plugins) |
| `workspace`, `scanned_repos`, `selected_repos` | Workspace runs |
| `agent_middleware` | `prepare-context` and middleware API |
| `delta` | Incremental delta runs |
| `profile` | `profile_run()` |
| `model_profile` | When `model_profile` is configured |

**Compatibility rule:** New features add fields rather than replacing existing ones.

---

## Extension Points

| Extension | What it changes |
|-----------|-----------------|
| `ScorerPlugin` | File relevance scoring |
| `CompressorPlugin` | Context compression strategy |
| `TokenEstimatorPlugin` | Token counting |
| Summarizer adapters | Summary generation |
| Telemetry sinks | Event handling |
| Agent adapters | Local integration behavior |
