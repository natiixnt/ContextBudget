# Python API

Use ContextBudget as a reusable library for local tools, CI wrappers, and agent integrations.

## Quick Start

```python
from contextbudget import BudgetGuard

guard = BudgetGuard(max_tokens=30000)
result = guard.pack_context(task="add caching", repo=".")
print(result["budget"]["estimated_input_tokens"], "tokens")
```

---

## BudgetGuard

`BudgetGuard` is the stable SDK entry point.

```python
BudgetGuard(
    max_tokens=None,
    top_files=None,
    max_files_included=None,       # policy
    max_quality_risk_level=None,   # policy: "low", "medium", "high"
    min_estimated_savings_percentage=None,  # policy
    max_context_size_bytes=None,   # policy
    policy_path=None,
    strict=False,
    config_path=None,
    engine=None,
)
```

---

## `pack_context`

```python
result = guard.pack_context(
    task="add caching to search API",
    repo=".",
    max_tokens=None,
    top_files=None,
    delta_from=None,   # previous run artifact for incremental context
    strict=None,
    policy_path=None,
)
```

Key result fields: `ranked_files`, `files_included`, `files_skipped`, `compressed_context`, `budget`.

Budget block: `estimated_input_tokens`, `estimated_saved_tokens`, `duplicate_reads_prevented`, `quality_risk_estimate`.

**Strict policy:**

```python
from contextbudget import BudgetGuard, BudgetPolicyViolationError

guard = BudgetGuard(max_tokens=30000, strict=True, max_files_included=10)
try:
    result = guard.pack_context(task="large refactor", repo=".")
except BudgetPolicyViolationError as err:
    for v in err.policy_result["violations"]:
        print(f"  - {v}")
```

**Delta mode:**

```python
first = guard.pack_context(task="add caching", repo=".")
second = guard.pack_context(task="add caching", repo=".", delta_from=first)
print(second["delta"]["budget"]["tokens_saved"], "tokens saved by delta")
```

---

## `simulate_agent`

```python
plan = guard.simulate_agent(task="refactor auth flow", repo=".", model="gpt-4o")

for step in plan["steps"]:
    print(f"{step['id']:12} {step['step_total_tokens']:6} tokens")

print(f"Cost: ${plan['cost_estimate']['total_cost_usd']:.4f}")
```

Step IDs: `inspect`, `implement`, `test`, `validate`, `document`.

---

## `profile_run`

```python
result = guard.profile_run(task="add caching", repo=".")
p = result["profile"]
print(f"packed in {p['elapsed_ms']} ms")
print(f"compression: {p['compression_ratio']:.1%} ({p['estimated_saved_tokens']} tokens saved)")
```

---

## `read_profile`

```python
run = guard.pack_context(task="add caching", repo=".")
report = guard.read_profile(run)

print(f"Tokens wasted total: {report['tokens_wasted_total']}")
for rec in report["duplicate_files"]:
    print(f"  duplicate: {rec['path']} ({rec['waste_tokens']} tokens wasted)")
```

Also accepts a path: `guard.read_profile("run.json")`

---

## `evaluate_policy`

```python
policy_result = guard.evaluate_policy(result)
if not policy_result["passed"]:
    for v in policy_result["violations"]:
        print(v)
```

---

## ContextBudgetEngine

Lower-level API:

```python
from contextbudget import ContextBudgetEngine

engine = ContextBudgetEngine()
plan = engine.plan(task="...", repo=".")
run = engine.pack(task="...", repo=".", max_tokens=24000)
advice = engine.advise(repo=".", history=["./runs/"])
policy = engine.make_policy(max_files_included=12, max_quality_risk_level="medium")
```

---

## Integration Patterns

**Agent loop with delta context:**

```python
guard = BudgetGuard(max_tokens=30000)
previous_run = None

for iteration in range(3):
    result = guard.pack_context(task="implement auth caching", repo=".", delta_from=previous_run)
    context_text = "\n".join(f["text"] for f in result["compressed_context"])
    # ... send to model ...
    previous_run = result
```

**Pre-flight cost check:**

```python
plan = guard.simulate_agent(task="refactor auth flow", repo=".", model="gpt-4o")
if plan["cost_estimate"]["total_cost_usd"] < 0.50:
    result = guard.pack_context(task="refactor auth flow", repo=".")
```
