# Benchmarking and Diff

## `contextbudget benchmark`

Compare packing strategies for one task:

| Strategy | Description |
|----------|-------------|
| naive full-context | All files, no compression |
| top-k selection | Top-ranked files, no compression |
| compressed pack | Full compression pipeline |
| cache-assisted pack | Compressed with summary cache |

```bash
contextbudget benchmark "add rate limiting to auth API" --repo .
contextbudget benchmark <task> --workspace <workspace.toml>
```

Outputs: terminal summary, JSON artifact, Markdown report, estimator comparison.

---

## `contextbudget diff`

Compare two run artifacts.

```bash
contextbudget diff old-run.json new-run.json
```

Inspects: task differences, files added/removed, score changes, token/savings/risk/cache deltas.

