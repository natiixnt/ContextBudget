# CLI Reference

## Commands Overview

| Command | Purpose |
|---------|---------|
| `plan` | Rank relevant files for a task |
| `plan-agent` | Plan multi-step agent workflow |
| `pack` | Build compressed context package |
| `profile` | Explain token savings by stage |
| `read-profiler` | Analyze agent read patterns |
| `report` | Render summary from run artifact |
| `diff` | Compare two run artifacts |
| `pr-audit` | Audit PR for context growth |
| `prepare-context` | Full middleware pipeline |
| `benchmark` | Compare packing strategies |
| `heatmap` | Aggregate historical token hotspots |
| `watch` | Monitor incremental scan index |

---

## `plan`

Rank relevant files for a natural-language task.

```bash
contextbudget plan <task> --repo <path>
contextbudget plan <task> --workspace <workspace.toml>
```

---

## `plan-agent`

Plan context usage across a multi-step agent workflow.

```bash
contextbudget plan-agent <task> --repo <path>
contextbudget plan-agent <task> --workspace <workspace.toml>
```

---

## `pack`

Build a compressed context package and write `run.json` + `run.md`.

```bash
contextbudget pack <task> --repo <path> [--max-tokens N] [--top-files N]

# Incremental (delta) mode:
contextbudget pack <task> --repo <path> --delta <previous-run.json>

# Workspace mode:
contextbudget pack <task> --workspace <workspace.toml>
```

---

## `profile`

Explain where token savings came from in a pack run.

```bash
contextbudget profile run.json [--out-prefix <prefix>]
```

Stages tracked: `cache_reuse`, `symbol_extraction`, `slicing`, `compression`, `snippet`, `delta`, `full`.

---

## `read-profiler`

Analyze agent file read patterns. Detects duplicate reads, unnecessary reads (low relevance + high cost), and high token-cost reads.

```bash
contextbudget read-profiler run.json [--out-prefix <prefix>]
```

---

## `report`

Render a summary report from a run artifact.

```bash
contextbudget report <run.json> [--out <path>] [--policy <policy.toml>]
```

---

## `diff`

Compare two run artifacts.

```bash
contextbudget diff old-run.json new-run.json
```

---

## `pr-audit`

Analyze a pull request diff directly from git.

```bash
contextbudget pr-audit --repo <path> [--base <ref>] [--head <ref>]

# GitHub Actions:
contextbudget pr-audit \
  --repo . \
  --base "${{ github.event.pull_request.base.sha }}" \
  --head "${{ github.event.pull_request.head.sha }}" \
  --out-prefix contextbudget-pr
```

CI gates: `--max-token-increase N`, `--max-token-increase-pct PCT`

---

## `prepare-context`

Run the full middleware pipeline.

```bash
contextbudget prepare-context "add caching" --repo . --max-tokens 20000
contextbudget prepare-context "add caching" --repo . --delta previous-run.json
contextbudget prepare-context "large refactor" --repo . --strict --policy policy.toml
```

---

## `benchmark`

Compare strategies: naive full-context, top-k, compressed, cache-assisted.

```bash
contextbudget benchmark "add rate limiting to auth API" --repo .
contextbudget benchmark <task> --workspace <workspace.toml>
```

---

## `heatmap`

Aggregate historical pack artifacts into token heatmaps.

```bash
contextbudget heatmap [<history> ...] [--limit N] [--out-prefix <path>]
```

---

## `watch`

Monitor the incremental scan index.

```bash
contextbudget watch --repo <path> [--poll-interval S] [--once]
```

---

## Global Flags

| Flag | Description |
|------|-------------|
| `--config <path>` | Load a custom `contextbudget.toml` |
| `--policy <path>` | Apply a policy TOML file |
| `--strict` | Return non-zero on policy violations |
| `--max-tokens N` | Override token budget |
| `--top-files N` | Override max candidate files |
| `--delta <run.json>` | Enable incremental delta mode |
| `--workspace <path>` | Use workspace TOML instead of `--repo` |
| `--out-prefix <prefix>` | Control output file name prefix |
