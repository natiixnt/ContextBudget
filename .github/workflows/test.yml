name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        # Cover the other platforms on one interpreter each - enough to catch
        # path/subprocess/select regressions (e.g. the Windows select() break)
        # without tripling the whole matrix.
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest --tb=short -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (changed files only)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          changed=$(git diff --name-only --diff-filter=ACMR "origin/${BASE_REF}...HEAD" -- '*.py' | grep -v -E '^(benchmarks|examples)/' || true)
          if [ -n "$changed" ]; then
            echo "$changed" | xargs ruff check
            echo "$changed" | xargs ruff format --check
          else
            echo "No Python files changed"
          fi

      - name: Ruff check (full, non-blocking)
        if: github.event_name == 'push'
        continue-on-error: true
        run: |
          ruff check .
          ruff format --check .

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies and pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pip-audit

      - name: Run pip-audit
        run: pip-audit

  adversarial:
    # Gate compressor robustness: the V85 genetic fuzzer must find no crash,
    # non-determinism, must-preserve, or below-floor finding on the fixed seed.
    # Without REDCON_V85_ENFORCE=1 the fuzzer only reports; this job makes it fail.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run adversarial compressor gate
        env:
          REDCON_V85_ENFORCE: "1"
        run: pytest tests/test_cmd_quality_adversarial.py --tb=short -q
